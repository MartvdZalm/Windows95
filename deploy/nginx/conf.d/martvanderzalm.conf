server {
    listen 80;
    listen [::]:80;
    server_name martvanderzalm.com www.martvanderzalm.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://martvanderzalm.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.martvanderzalm.com;

    include /etc/nginx/conf.d/ssl.conf;

    return 301 https://martvanderzalm.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name martvanderzalm.com;

    include /etc/nginx/conf.d/ssl.conf;

    location / {
        proxy_pass http://martvanderzalm:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name knight.martvanderzalm.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://knight.martvanderzalm.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name knight.martvanderzalm.com;

    include /etc/nginx/conf.d/ssl.conf;

    client_max_body_size 1m;

    location / {
        proxy_pass http://knight:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
