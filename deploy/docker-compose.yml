networks:
  web:
    name: web
    driver: bridge

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: reverse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - web
    depends_on:
      - windows95
      - knight

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - web

  windows95:
    image: ${WINDOWS95_IMAGE:-martvdzalm/windows95-angular-app:latest}
    container_name: martvanderzalm
    restart: unless-stopped
    networks:
      - web

  knight:
    image: ${KNIGHT_IMAGE:-martvdzalm/knight:latest}
    container_name: knight
    restart: unless-stopped
    environment:
      KNIGHT_ALLOWED_FRAME_ANCESTORS: ${KNIGHT_ALLOWED_FRAME_ANCESTORS:-https://martvanderzalm.com}
    networks:
      - web
